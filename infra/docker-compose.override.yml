# Local dev override.
#
# The original version of this file disabled the containerized Ollama (via
# `deploy.replicas: 0`, which is a swarm-only directive and ignored by
# `docker compose up`) and redirected api/worker to a host-installed Ollama
# at `host.docker.internal`. That setup required Ollama to be installed on
# the host; without it, api/worker get DNS errors and no embeddings run.
#
# This version points api+worker back at the containerized Ollama so seeding
# works without a host install. To switch back to host Ollama for Metal
# acceleration, restore the previous content from git history and install
# Ollama locally.

services:
  api:
    environment:
      OLLAMA_URL: http://ollama:11434

  worker:
    environment:
      OLLAMA_URL: http://ollama:11434
